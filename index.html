<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orb.io</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a12;
      }
      #three-root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #menu-overlay {
        position: fixed;
        left: 50%;
        bottom: 16%;
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        padding: 14px 18px;
        border-radius: 12px;
        background: rgba(12, 10, 24, 0.88);
        border: 1px solid rgba(120, 200, 255, 0.35);
        box-shadow: 0 0 24px rgba(0, 232, 200, 0.15);
        pointer-events: auto;
        min-width: 260px;
        font-family: system-ui, sans-serif;
      }
      .menu-row {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 8px;
      }
      #nickname-input,
      #start-button {
        box-sizing: border-box;
      }
      #menu-overlay label {
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #9ad4ff;
      }
      #nickname-input {
        flex: 1;
        min-width: 0;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(100, 160, 220, 0.5);
        background: rgba(6, 8, 18, 0.95);
        color: #e8f4ff;
        font-size: 16px;
        outline: none;
      }
      #nickname-input:focus {
        border-color: #40e8f5;
        box-shadow: 0 0 0 2px rgba(64, 232, 245, 0.25);
      }
      #start-button {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.03em;
        white-space: nowrap;
        cursor: pointer;
        color: #061018;
        background: linear-gradient(165deg, #5eefff, #3ac8d8);
        box-shadow: 0 2px 10px rgba(0, 232, 200, 0.3);
      }
      #start-button:hover {
        filter: brightness(1.08);
      }
      #start-button:focus-visible {
        outline: 2px solid #40e8f5;
        outline-offset: 2px;
      }
      #leaderboard-panel {
        margin-top: 4px;
        padding-top: 10px;
        border-top: 1px solid rgba(100, 160, 220, 0.25);
      }
      .leaderboard-title {
        margin: 0 0 8px 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9ad4ff;
      }
      #leaderboard-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 220px;
        overflow-y: auto;
      }
      .leaderboard-row {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        font-size: 13px;
        color: #e8f4ff;
      }
      .lb-rank {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: #40e8f5;
      }
      .lb-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .lb-score {
        font-variant-numeric: tabular-nums;
        color: #c4f5e8;
      }
      .leaderboard-empty {
        padding: 4px 0;
        font-size: 12px;
        color: rgba(154, 212, 255, 0.65);
      }
    </style>
  </head>
  <body>
    <div id="menu-overlay" role="dialog" aria-label="Start game">
      <label for="nickname-input">Nickname</label>
      <div class="menu-row">
        <input
          id="nickname-input"
          type="text"
          maxlength="14"
          placeholder="Player"
          spellcheck="false"
          autocomplete="username"
        />
        <button type="button" id="start-button">Start</button>
      </div>
      <section id="leaderboard-panel" aria-label="Best scores by nickname">
        <h2 class="leaderboard-title">Top 10</h2>
        <ol id="leaderboard-list"></ol>
      </section>
    </div>
    <div id="three-root" aria-hidden="true"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
